# ===================== YEREL EKF (odom -> base_link) =====================
ekf_local:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: true
    publish_tf: true
    use_sim_time: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # IMU verisini kullan
    imu0: /gazebo_ros_imu/out
    imu0_config: [false, false, false,
                  true,  true,  true,
                  false, false, false,
                  true,  true,  true,
                  true,  false, false]
    imu0_differential: false
    imu0_relative: true

    # Wheel odometry
    odom0: /odom
    odom0_config: [true,  true,  false,
                   false, false, false,
                   true,  false, false,
                   false, false, true,
                   false, false, false]
    odom0_differential: true

# ===================== GLOBAL EKF (map -> odom) =====================
ekf_global:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: true
    publish_tf: true
    use_sim_time: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: map

    # Yerel EKF'nin çıktısı
#    odom0: /odometry/local
#    odom0_config: [true,  true,  false,
#                   false, false, false,
#                   true,  false, false,
#                   false, false, true,
#                   false, false, false]
#    odom0_differential: false

    # GPS (navsat_transform_node'dan)
    odom1: /odometry/gps
    odom1_config: [true,  true,  false,
                   false, false, false,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom1_differential: false
